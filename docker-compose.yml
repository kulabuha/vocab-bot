# Запуск: cp .env.example .env && заполни .env, затем docker compose up -d
# Только бот (основной сценарий): docker compose up -d bot
# Бот + MCP API: docker compose up -d

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: vocab-bot:latest
    environment:
      - DB_PATH=/data/app.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LLM_API_BASE=${LLM_API_BASE:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_TIMEOUT_SEC=${LLM_TIMEOUT_SEC:-60}
    env_file: .env
    volumes:
      - bot-data:/data
    # Если LLM на хосте (Ollama и т.п.): LLM_API_BASE=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Опционально: HTTP API для скриптов/Cursor (add_words, next_exercise, grade_answer, stats)
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: vocab-bot-mcp:latest
    environment:
      - DB_PATH=/data/app.db
      - MCP_PORT=8080
      - LLM_API_BASE=${LLM_API_BASE:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles:
      - mcp

volumes:
  bot-data:
