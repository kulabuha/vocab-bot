# Example; use kubectl create secret or sealed-secrets in production.
# kubectl create secret generic vocab-bot-secrets --from-literal=TELEGRAM_BOT_TOKEN=xxx --from-literal=LLM_API_KEY=xxx
apiVersion: v1
kind: Secret
metadata:
  name: vocab-bot-secrets
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "<your-telegram-bot-token-from-botfather>"
  LLM_API_KEY: "<your-llm-api-key-or-omit-for-ollama>"
